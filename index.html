<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深淵病棟 - Single File Horror</title>
  <style>
    :root {
      --bg: #050505;
      --panel: rgba(10, 10, 10, 0.82);
      --text: #e8e8e8;
      --danger: #ff2d55;
      --safe: #56f58f;
      --accent: #87c1ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: radial-gradient(circle at 50% 20%, #111 0%, #000 70%);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .wrap {
      width: min(96vw, 980px);
      display: grid;
      gap: 10px;
    }

    #hud {
      background: var(--panel);
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(2px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      font-size: 14px;
    }

    #hud b { color: var(--accent); }

    #game {
      width: min(96vw, 980px);
      aspect-ratio: 16 / 9;
      background: #040404;
      border: 1px solid #1b1b1b;
      border-radius: 12px;
      display: block;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      background: rgba(0,0,0,0);
      transition: background .25s;
    }

    #message {
      max-width: 640px;
      width: min(92vw, 640px);
      background: rgba(0,0,0,0.86);
      border: 1px solid #303030;
      border-radius: 12px;
      padding: 18px;
      line-height: 1.6;
      transform: scale(0.95);
      opacity: 0;
      transition: .25s;
      text-align: left;
    }

    #message h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: .08em;
    }

    #message p { margin: 8px 0; }

    #message button {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid #555;
      color: #fff;
      background: linear-gradient(#222, #111);
      cursor: pointer;
      pointer-events: auto;
    }

    #overlay.show {
      pointer-events: auto;
      background: rgba(0,0,0,0.52);
    }

    #overlay.show #message {
      transform: scale(1);
      opacity: 1;
    }

    #jumpscare {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(120,0,0,0.93);
      color: #fff;
      font-size: clamp(34px, 6vw, 72px);
      font-weight: 800;
      letter-spacing: .14em;
      text-shadow: 0 0 16px #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .08s;
      mix-blend-mode: screen;
    }

    #jumpscare.show { opacity: 1; }

    .danger { color: var(--danger); font-weight: 700; }
    .safe { color: var(--safe); font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="hud">
      <div>目標: <b>鍵を3つ集めて出口へ到達</b></div>
      <div>鍵: <span id="keys">0 / 3</span></div>
      <div>正気度: <span id="sanity">100</span></div>
      <div>足音: <span id="proximity">遠い</span></div>
    </div>
    <canvas id="game" width="1280" height="720"></canvas>
  </div>

  <div id="overlay" class="show">
    <div id="message">
      <h1>深淵病棟</h1>
      <p>あなたは廃病棟に閉じ込められた。懐中電灯は弱く、暗闇には何かが潜んでいる。</p>
      <p>操作: <b>WASD / 矢印</b>で移動、<b>Shift</b>で走る（正気度消費）。
      3つの鍵を拾って、青い扉から脱出せよ。</p>
      <p class="danger">音は出せない。見つかれば、終わりだ。</p>
      <button id="startBtn">開始する</button>
    </div>
  </div>

  <div id="jumpscare">見 つ け た</div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const keysEl = document.getElementById('keys');
      const sanityEl = document.getElementById('sanity');
      const proximityEl = document.getElementById('proximity');
      const overlay = document.getElementById('overlay');
      const message = document.getElementById('message');
      const jumpscare = document.getElementById('jumpscare');
      const startBtn = document.getElementById('startBtn');

      const world = {
        w: 2400,
        h: 1500,
        walls: [],
        keys: [],
        exit: { x: 2220, y: 1320, w: 90, h: 120 }
      };

      const player = {
        x: 120,
        y: 120,
        r: 20,
        speed: 2.6,
        sprint: 4.5,
        sanity: 100,
        collected: 0
      };

      const ghost = {
        x: 2100,
        y: 240,
        r: 26,
        speed: 1.2,
        rageSpeed: 2.4,
        rage: 0,
        visiblePulse: 0
      };

      let running = false;
      let gameOver = false;
      let win = false;
      const pressed = new Set();
      let shake = 0;
      let time = 0;

      function makeWalls() {
        const frame = 80;
        world.walls = [
          { x: 0, y: 0, w: world.w, h: frame },
          { x: 0, y: world.h - frame, w: world.w, h: frame },
          { x: 0, y: 0, w: frame, h: world.h },
          { x: world.w - frame, y: 0, w: frame, h: world.h },

          // Vertical blocks with clear gaps (avoid soft-locks)
          { x: 360, y: 80, w: 80, h: 300 },
          { x: 360, y: 560, w: 80, h: 600 },
          { x: 700, y: 280, w: 80, h: 480 },
          { x: 700, y: 940, w: 80, h: 480 },
          { x: 1080, y: 80, w: 80, h: 360 },
          { x: 1080, y: 640, w: 80, h: 780 },
          { x: 1460, y: 260, w: 80, h: 500 },
          { x: 1460, y: 940, w: 80, h: 480 },
          { x: 1840, y: 80, w: 80, h: 360 },
          { x: 1840, y: 620, w: 80, h: 800 },

          // Horizontal blocks with passages
          { x: 440, y: 480, w: 620, h: 80 },
          { x: 1240, y: 480, w: 520, h: 80 },
          { x: 200, y: 860, w: 520, h: 80 },
          { x: 900, y: 860, w: 820, h: 80 },
          { x: 440, y: 1240, w: 780, h: 80 },
          { x: 1400, y: 1240, w: 620, h: 80 }
        ];
      }

      function makeKeys() {
        world.keys = [
          { x: 500, y: 1260, r: 12, got: false },
          { x: 1320, y: 180, r: 12, got: false },
          { x: 2060, y: 1160, r: 12, got: false }
        ];
      }

      makeWalls();
      makeKeys();

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function circleRectCollide(c, r) {
        const closestX = Math.max(r.x, Math.min(c.x, r.x + r.w));
        const closestY = Math.max(r.y, Math.min(c.y, r.y + r.h));
        const dx = c.x - closestX;
        const dy = c.y - closestY;
        return dx * dx + dy * dy < c.r * c.r;
      }

      function resolveWallOverlap(circle) {
        for (let iter = 0; iter < 4; iter++) {
          let collided = false;
          for (const wall of world.walls) {
            if (!circleRectCollide(circle, wall)) continue;

            const closestX = Math.max(wall.x, Math.min(circle.x, wall.x + wall.w));
            const closestY = Math.max(wall.y, Math.min(circle.y, wall.y + wall.h));
            let dx = circle.x - closestX;
            let dy = circle.y - closestY;
            let dist = Math.hypot(dx, dy);

            if (dist < 0.001) {
              const centerX = wall.x + wall.w / 2;
              const centerY = wall.y + wall.h / 2;
              dx = circle.x - centerX;
              dy = circle.y - centerY;
              if (Math.abs(dx) > Math.abs(dy)) dy = 0;
              else dx = 0;
              dist = Math.hypot(dx, dy) || 1;
            }

            const push = circle.r - dist + 0.2;
            circle.x += (dx / dist) * push;
            circle.y += (dy / dist) * push;
            collided = true;
          }
          if (!collided) break;
        }
      }

      function movePlayer(dx, dy) {
        const steps = Math.max(1, Math.ceil(Math.max(Math.abs(dx), Math.abs(dy)) / 8));
        const stepX = dx / steps;
        const stepY = dy / steps;

        for (let i = 0; i < steps; i++) {
          player.x += stepX;
          resolveWallOverlap(player);
          player.y += stepY;
          resolveWallOverlap(player);
        }
      }

      function canSeeGhost() {
        const d = distance(player, ghost);
        if (d > 230) return false;

        const steps = Math.floor(d / 12);
        for (let i = 1; i < steps; i++) {
          const t = i / steps;
          const sx = player.x + (ghost.x - player.x) * t;
          const sy = player.y + (ghost.y - player.y) * t;
          for (const w of world.walls) {
            if (sx >= w.x && sx <= w.x + w.w && sy >= w.y && sy <= w.y + w.h) {
              return false;
            }
          }
        }
        return true;
      }

      function update(dt) {
        if (!running || gameOver || win) return;

        time += dt;
        const moveX = (pressed.has('d') || pressed.has('arrowright') ? 1 : 0)
          - (pressed.has('a') || pressed.has('arrowleft') ? 1 : 0);
        const moveY = (pressed.has('s') || pressed.has('arrowdown') ? 1 : 0)
          - (pressed.has('w') || pressed.has('arrowup') ? 1 : 0);

        const mag = Math.hypot(moveX, moveY) || 1;
        const sprinting = pressed.has('shift') && player.sanity > 8;
        const speed = sprinting ? player.sprint : player.speed;

        movePlayer((moveX / mag) * speed * dt * 60, (moveY / mag) * speed * dt * 60);

        if (sprinting) {
          player.sanity -= 15 * dt;
          ghost.rage = Math.min(1, ghost.rage + dt * 0.8);
        } else {
          player.sanity += 8 * dt;
          ghost.rage = Math.max(0, ghost.rage - dt * 0.35);
        }

        if (canSeeGhost()) {
          player.sanity -= 24 * dt;
          ghost.visiblePulse = 1;
        }
        ghost.visiblePulse = Math.max(0, ghost.visiblePulse - dt * 2.2);

        player.sanity = Math.max(0, Math.min(100, player.sanity));

        const gx = player.x - ghost.x;
        const gy = player.y - ghost.y;
        const gd = Math.hypot(gx, gy) || 1;
        const gs = (ghost.speed + (ghost.rageSpeed - ghost.speed) * ghost.rage) * dt * 60;
        ghost.x += (gx / gd) * gs;
        ghost.y += (gy / gd) * gs;

        resolveWallOverlap(ghost);

        for (const k of world.keys) {
          if (!k.got && distance(player, k) < player.r + k.r + 3) {
            k.got = true;
            player.collected++;
            shake = 8;
          }
        }

        if (distance(player, ghost) < player.r + ghost.r + 4 || player.sanity <= 0) {
          triggerGameOver();
        }

        const e = world.exit;
        if (player.collected === world.keys.length
          && player.x > e.x && player.x < e.x + e.w
          && player.y > e.y && player.y < e.y + e.h) {
          triggerWin();
        }

        keysEl.textContent = `${player.collected} / ${world.keys.length}`;
        sanityEl.textContent = Math.round(player.sanity);

        const pd = distance(player, ghost);
        proximityEl.textContent = pd < 130 ? '背後にいる' : pd < 260 ? '非常に近い' : pd < 420 ? '近い' : pd < 650 ? '中距離' : '遠い';
        if (pd < 260) proximityEl.className = 'danger';
        else if (pd < 450) proximityEl.className = '';
        else proximityEl.className = 'safe';
      }

      function triggerGameOver() {
        gameOver = true;
        running = false;
        jumpscare.classList.add('show');
        setTimeout(() => jumpscare.classList.remove('show'), 220);
        showPanel('GAME OVER',
          '廃病棟に飲み込まれた。暗闇は、もうあなたを離さない。<br><br>Rキーでリトライ');
      }

      function triggerWin() {
        win = true;
        running = false;
        showPanel('脱出成功',
          '扉が開き、冷たい夜気が流れ込む。<br>だが背後ではまだ、足音が止まない…<br><br>Rキーで再挑戦');
      }

      function showPanel(title, body) {
        message.innerHTML = `<h1>${title}</h1><p>${body}</p><button id="retryBtn">閉じる</button>`;
        overlay.classList.add('show');
        const retryBtn = document.getElementById('retryBtn');
        retryBtn.addEventListener('click', () => overlay.classList.remove('show'));
      }

      function reset() {
        player.x = 120;
        player.y = 120;
        player.sanity = 100;
        player.collected = 0;
        ghost.x = 2100;
        ghost.y = 240;
        ghost.rage = 0;
        ghost.visiblePulse = 0;
        makeKeys();
        gameOver = false;
        win = false;
        running = true;
        overlay.classList.remove('show');
      }

      const sprites = {
        player: [
          '..11..',
          '.1221.',
          '122221',
          '123321',
          '.1331.',
          '.1..1.'
        ],
        ghost: [
          '.1111.',
          '122221',
          '123321',
          '122221',
          '144441',
          '.1..1.'
        ],
        key: [
          '..22..',
          '.2332.',
          '..22..',
          '..2...',
          '.2222.',
          '..2.2.'
        ]
      };

      const spritePalettes = {
        player: { '1': '#d8f2ff', '2': '#a8d8ff', '3': '#4ba6ff' },
        ghost: { '1': '#f2f2f2', '2': '#d6d6d6', '3': '#7e0000', '4': '#b40000' },
        key: { '2': '#ffe36d', '3': '#f6bd2b' }
      };

      function drawSprite(cx, cy, pixelSize, pattern, palette, alpha = 1) {
        ctx.save();
        ctx.globalAlpha = alpha;
        const h = pattern.length;
        const w = pattern[0].length;
        const ox = cx - (w * pixelSize) / 2;
        const oy = cy - (h * pixelSize) / 2;

        for (let y = 0; y < h; y++) {
          for (let x = 0; x < w; x++) {
            const code = pattern[y][x];
            if (code === '.') continue;
            ctx.fillStyle = palette[code] || '#fff';
            ctx.fillRect(ox + x * pixelSize, oy + y * pixelSize, pixelSize, pixelSize);
          }
        }
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const camX = Math.max(0, Math.min(world.w - canvas.width, player.x - canvas.width / 2));
        const camY = Math.max(0, Math.min(world.h - canvas.height, player.y - canvas.height / 2));

        if (shake > 0) {
          shake *= 0.84;
          ctx.save();
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
        }

        ctx.fillStyle = '#0b0b0b';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(-camX, -camY);

        // Floor noise
        for (let i = 0; i < 280; i++) {
          const n = (Math.sin(i * 12.9898 + time * 0.3) * 43758.5453) % 1;
          const x = ((i * 161) % world.w);
          const y = ((i * 239) % world.h);
          ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.abs(n) * 0.03})`;
          ctx.fillRect(x, y, 2, 2);
        }

        // Exit
        ctx.fillStyle = player.collected === world.keys.length ? '#3ca0ff' : '#14314f';
        ctx.fillRect(world.exit.x, world.exit.y, world.exit.w, world.exit.h);
        ctx.strokeStyle = '#a6d2ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(world.exit.x, world.exit.y, world.exit.w, world.exit.h);

        // Walls (pixel-style tiles)
        for (const w of world.walls) {
          ctx.fillStyle = '#242424';
          ctx.fillRect(w.x, w.y, w.w, w.h);
          for (let yy = w.y; yy < w.y + w.h; yy += 16) {
            for (let xx = w.x; xx < w.x + w.w; xx += 16) {
              const tone = ((xx / 16 + yy / 16) % 2 === 0) ? '#2c2c2c' : '#303030';
              ctx.fillStyle = tone;
              ctx.fillRect(xx + 1, yy + 1, 14, 14);
            }
          }
        }

        // Keys (pixel sprite)
        for (const k of world.keys) {
          if (k.got) continue;
          const pulse = 0.68 + Math.sin(time * 7 + k.x) * 0.22;
          ctx.fillStyle = `rgba(255,223,80,${pulse * 0.45})`;
          ctx.fillRect(k.x - 18, k.y - 18, 36, 36);
          drawSprite(k.x, k.y, 4, sprites.key, spritePalettes.key, 0.96);
        }

        // Ghost (pixel sprite)
        const ghostAlpha = 0.45 + ghost.visiblePulse * 0.55;
        drawSprite(ghost.x, ghost.y, 7, sprites.ghost, spritePalettes.ghost, ghostAlpha);

        // Player (pixel sprite)
        drawSprite(player.x, player.y, 7, sprites.player, spritePalettes.player, 1);

        ctx.restore();

        // Darkness + flashlight
        const px = player.x - camX;
        const py = player.y - camY;
        const flicker = 0.92 + Math.sin(time * 22) * 0.04 + (Math.random() - 0.5) * 0.03;
        const lightRadius = (300 + player.sanity * 1.6) * flicker;

        ctx.fillStyle = `rgba(0,0,0,${0.48 + (1 - flicker) * 0.18})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.globalCompositeOperation = 'destination-out';
        const grad = ctx.createRadialGradient(px, py, 8, px, py, lightRadius);
        grad.addColorStop(0, 'rgba(0,0,0,0.95)');
        grad.addColorStop(0.45, 'rgba(0,0,0,0.45)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, lightRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = 'source-over';

        // Ambient lift (subtle darkness)
        ctx.fillStyle = 'rgba(36, 46, 68, 0.12)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Vignette + static
        const vignette = ctx.createRadialGradient(
          canvas.width / 2, canvas.height / 2, 200,
          canvas.width / 2, canvas.height / 2, canvas.width / 1.2
        );
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.58)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 40; i++) {
          const y = (Math.sin(time * 90 + i * 13.1) * 0.5 + 0.5) * canvas.height;
          ctx.fillStyle = `rgba(255,255,255,${0.008 + Math.random() * 0.015})`;
          ctx.fillRect(0, y, canvas.width, 1);
        }

        if (shake > 0) ctx.restore();
      }

      let last = performance.now();
      function loop(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      window.addEventListener('keydown', (e) => {
        pressed.add(e.key.toLowerCase());
        if (e.key.toLowerCase() === 'r') reset();
      });
      window.addEventListener('keyup', (e) => pressed.delete(e.key.toLowerCase()));

      startBtn.addEventListener('click', () => {
        overlay.classList.remove('show');
        running = true;
      });
    })();
  </script>
</body>
</html>
